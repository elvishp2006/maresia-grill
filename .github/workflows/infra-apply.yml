name: Infra Apply

on:
  push:
    branches: [main]
    paths:
      - infra/terraform/**
      - .github/workflows/infra-plan.yml
      - .github/workflows/infra-apply.yml
  workflow_dispatch:
    inputs:
      target:
        description: "Ambiente de apply"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - staging
          - production

jobs:
  apply-staging:
    if: github.event_name == 'push' || github.event.inputs.target == 'all' || github.event.inputs.target == 'staging'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version_file: .opentofu-version
          tofu_wrapper: false

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_TERRAFORM_CREDENTIALS_STAGING }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Terraform Init
        run: |
          tofu -chdir=infra/terraform/environments/staging init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=staging"
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}

      - name: Terraform Apply
        run: tofu -chdir=infra/terraform/environments/staging apply -auto-approve -input=false
        env:
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID_STAGING }}
          TF_VAR_project_number: ${{ vars.GCP_PROJECT_NUMBER_STAGING }}
          TF_VAR_region: us-central1
          TF_VAR_app_deployer_member: ${{ vars.APP_DEPLOYER_MEMBER_STAGING }}

  apply-production:
    if: github.event_name == 'push' || github.event.inputs.target == 'all' || github.event.inputs.target == 'production'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version_file: .opentofu-version
          tofu_wrapper: false

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_TERRAFORM_CREDENTIALS_PRODUCTION }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Terraform Init
        run: |
          tofu -chdir=infra/terraform/environments/production init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=production"
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}

      - name: Terraform Apply
        run: tofu -chdir=infra/terraform/environments/production apply -auto-approve -input=false
        env:
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID_PRODUCTION }}
          TF_VAR_project_number: ${{ vars.GCP_PROJECT_NUMBER_PRODUCTION }}
          TF_VAR_region: us-central1
          TF_VAR_app_deployer_member: ${{ vars.APP_DEPLOYER_MEMBER_PRODUCTION }}

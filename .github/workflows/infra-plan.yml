name: Infra Plan

on:
  pull_request:
    paths:
      - infra/terraform/**
      - .github/workflows/infra-plan.yml
      - .github/workflows/infra-apply.yml

jobs:
  plan-staging:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version_file: .opentofu-version
          tofu_wrapper: false

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_TERRAFORM_CREDENTIALS_STAGING }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Terraform Init
        run: |
          tofu -chdir=infra/terraform/environments/staging init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=staging"
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}

      - name: Terraform Format
        run: tofu -chdir=infra/terraform fmt -check -recursive

      - name: Terraform Validate
        run: tofu -chdir=infra/terraform/environments/staging validate

      - name: Terraform Plan
        run: tofu -chdir=infra/terraform/environments/staging plan -input=false
        env:
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID_STAGING }}
          TF_VAR_project_number: ${{ vars.GCP_PROJECT_NUMBER_STAGING }}
          TF_VAR_region: us-central1
          TF_VAR_app_deployer_member: ${{ vars.APP_DEPLOYER_MEMBER_STAGING }}

  plan-production:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version_file: .opentofu-version
          tofu_wrapper: false

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_TERRAFORM_CREDENTIALS_PRODUCTION }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Terraform Init
        run: |
          tofu -chdir=infra/terraform/environments/production init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=production"
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}

      - name: Terraform Format
        run: tofu -chdir=infra/terraform fmt -check -recursive

      - name: Terraform Validate
        run: tofu -chdir=infra/terraform/environments/production validate

      - name: Terraform Plan
        run: tofu -chdir=infra/terraform/environments/production plan -input=false
        env:
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID_PRODUCTION }}
          TF_VAR_project_number: ${{ vars.GCP_PROJECT_NUMBER_PRODUCTION }}
          TF_VAR_region: us-central1
          TF_VAR_app_deployer_member: ${{ vars.APP_DEPLOYER_MEMBER_PRODUCTION }}

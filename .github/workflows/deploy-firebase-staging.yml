name: Deploy Firebase Staging

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: firebase-staging-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-staging:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: read
      pull-requests: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - run: npm ci

      - run: npm --prefix functions ci

      - run: npm run lint

      - run: npm test

      - run: npm run build

      - run: npm --prefix functions run build

      - name: Resolve Render Preview URL
        id: preview
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.payload.pull_request.head.sha;

            const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

            for (let attempt = 1; attempt <= 18; attempt += 1) {
              core.info(`Looking for Render preview deployment for ${sha}, attempt ${attempt}/18`);
              const deployments = await github.paginate(github.rest.repos.listDeployments, {
                owner,
                repo,
                sha,
                per_page: 100,
              });

              for (const deployment of deployments) {
                const statuses = await github.paginate(github.rest.repos.listDeploymentStatuses, {
                  owner,
                  repo,
                  deployment_id: deployment.id,
                  per_page: 100,
                });

                for (const status of statuses) {
                  const candidate = status.environment_url || status.target_url;
                  if (status.state !== 'success' || !candidate) continue;
                  if (!candidate.includes('onrender.com')) continue;

                  core.info(`Found Render preview URL: ${candidate}`);
                  core.setOutput('url', candidate.replace(/\/$/, ''));
                  return;
                }
              }

              await sleep(20000);
            }

            core.setFailed('Render preview URL not found for this PR. Wait for the preview deployment to finish and rerun the workflow.');

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: npm install -g firebase-tools

      - run: npm run gcp:check -- --project "${FIREBASE_PROJECT_ID_STAGING}"
        env:
          FIREBASE_PROJECT_ID_STAGING: ${{ secrets.FIREBASE_PROJECT_ID_STAGING }}

      - name: Write Functions Env
        run: |
          cat <<EOF > functions/.env
          STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
          STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
          PUBLIC_MENU_BASE_URL=${PUBLIC_MENU_BASE_URL}
          EOF
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY_STAGING }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET_STAGING }}
          PUBLIC_MENU_BASE_URL: ${{ steps.preview.outputs.url }}

      - name: Deploy Functions and Rules to Staging
        run: firebase deploy --only functions,firestore:rules --project "${FIREBASE_PROJECT_ID_STAGING}" --force
        env:
          FIREBASE_PROJECT_ID_STAGING: ${{ secrets.FIREBASE_PROJECT_ID_STAGING }}

      - name: Verify Public Checkout CORS in Staging
        env:
          FIREBASE_PROJECT_ID_STAGING: ${{ secrets.FIREBASE_PROJECT_ID_STAGING }}
          TEST_ORIGIN: ${{ steps.preview.outputs.url }}
        run: |
          set -euo pipefail

          endpoint="https://us-central1-${FIREBASE_PROJECT_ID_STAGING}.cloudfunctions.net/preparePublicOrderCheckout"
          headers_file="$(mktemp)"

          status="$(
            curl -sS -o /dev/null -D "$headers_file" \
              -X OPTIONS \
              -H "Origin: ${TEST_ORIGIN}" \
              -H "Access-Control-Request-Method: POST" \
              "$endpoint" \
              -w '%{http_code}'
          )"

          if [ "$status" = "403" ]; then
            echo "Preflight recebeu 403 em $endpoint"
            cat "$headers_file"
            exit 1
          fi

          if ! grep -Eiq '^access-control-allow-origin:' "$headers_file"; then
            echo "Header Access-Control-Allow-Origin ausente em $endpoint"
            cat "$headers_file"
            exit 1
          fi

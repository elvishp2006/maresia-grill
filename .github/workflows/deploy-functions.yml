name: Deploy Functions

on:
  push:
    branches: [main, staging]
    paths:
      - apps/functions/**
      - packages/domain/**
      - packages/tsconfig/**
      - .github/workflows/deploy-functions.yml
      - .npmrc
      - firebase.json
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml

jobs:
  deploy:
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'staging')
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ github.ref_name == 'main' && secrets.GCP_TERRAFORM_CREDENTIALS_PRODUCTION || secrets.GCP_TERRAFORM_CREDENTIALS_STAGING }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm --filter @maresia-grill/functions build

      - name: Validate Stripe Key Mode
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            if [[ "${STRIPE_SECRET_KEY}" != sk_live_* ]]; then
              echo "Produção exige STRIPE_SECRET_KEY live."
              exit 1
            fi
          else
            if [[ "${STRIPE_SECRET_KEY}" != sk_test_* ]]; then
              echo "Staging exige STRIPE_SECRET_KEY test."
              exit 1
            fi
          fi

      - name: Write Functions Env
        run: |
          cat <<EOF > apps/functions/.env
          STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
          STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
          EOF
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}

      - run: pnpm exec firebase deploy --only functions --project "${{ vars.GCP_PROJECT_ID }}" --force

      - name: Validate Checkout Secret Mode
        env:
          FIREBASE_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          TEST_ORIGIN: ${{ vars.PUBLIC_WEB_ORIGIN }}
          EXPECTED_CLIENT_SECRET_PREFIX: ${{ github.ref_name == 'main' && 'cs_live_' || 'cs_test_' }}
        run: |
          set -euo pipefail

          set +e
          checkout_probe="$(
            node <<'EOF'
          const admin = require('./apps/functions/node_modules/firebase-admin');

          if (!admin.apps.length) admin.initializeApp();

          const db = admin.firestore();

          (async () => {
            const menuSnap = await db.collection('dailyMenus').where('status', '==', 'published').get();
            for (const doc of menuSnap.docs) {
              const data = doc.data();
              if (typeof data.shareToken !== 'string' || typeof data.activeVersionId !== 'string') continue;

              const versionSnap = await db.doc(`dailyMenus/${doc.id}/versions/${data.activeVersionId}`).get();
              if (!versionSnap.exists) continue;

              const version = versionSnap.data();
              const paidItem = Array.isArray(version?.items)
                ? version.items.find((item) => typeof item?.id === 'string' && typeof item?.priceCents === 'number' && item.priceCents > 0)
                : null;
              if (!paidItem) continue;

              process.stdout.write(JSON.stringify({
                shareToken: data.shareToken,
                dateKey: doc.id,
                itemId: paidItem.id,
              }));
              return;
            }

            process.exit(2);
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF
          )"
          checkout_probe_status=$?
          set -e

          if [ "$checkout_probe_status" = "2" ]; then
            echo "Nenhum cardápio publicado com item pago disponível para validar o modo do checkout. Pulando smoke test."
            exit 0
          fi

          if [ "$checkout_probe_status" != "0" ]; then
            echo "Falha ao preparar o smoke test do checkout."
            exit 1
          fi

          endpoint="https://us-central1-${FIREBASE_PROJECT_ID}.cloudfunctions.net/preparePublicOrderCheckout"
          response_file="$(mktemp)"
          payload="$(
            node -e '
              const probe = JSON.parse(process.argv[1]);
              const orderId = `stripe-smoke-${Date.now()}`;
              const body = {
                orderId,
                shareToken: probe.shareToken,
                dateKey: probe.dateKey,
                customerName: "Smoke Test",
                selectedItemIds: [probe.itemId],
                successUrl: process.argv[2] + "/#/enviado",
                pendingUrl: process.argv[2] + "/#/enviado",
                failureUrl: process.argv[2] + "/#/pedido",
              };
              process.stdout.write(JSON.stringify(body));
            ' "$checkout_probe" "$TEST_ORIGIN"
          )"

          status="$(
            curl -sS -o "$response_file" \
              -X POST \
              -H "Origin: ${TEST_ORIGIN}" \
              -H "Content-Type: application/json" \
              --data "$payload" \
              "$endpoint" \
              -w '%{http_code}'
          )"

          response_message="$(
            node -e '
              const fs = require("node:fs");
              const data = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
              process.stdout.write(typeof data.message === "string" ? data.message : "");
            ' "$response_file"
          )"

          if [ "$status" = "400" ] && [ "$response_message" = "Nenhum item válido encontrado para este pedido." ]; then
            echo "O staging nao possui um item pago utilizavel para validar o modo do checkout agora. Pulando smoke test."
            exit 0
          fi

          if [ "$status" != "200" ]; then
            echo "Falha ao validar o checkout publico."
            cat "$response_file"
            exit 1
          fi

          client_secret="$(
            node -e '
              const fs = require("node:fs");
              const data = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
              process.stdout.write(data.checkoutSession?.clientSecret ?? "");
            ' "$response_file"
          )"

          if [[ "${client_secret}" != ${EXPECTED_CLIENT_SECRET_PREFIX}* ]]; then
            echo "Checkout gerou client secret com modo incorreto."
            cat "$response_file"
            exit 1
          fi

      - name: Verify Public Checkout Access
        env:
          FIREBASE_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          TEST_ORIGIN: ${{ vars.PUBLIC_WEB_ORIGIN }}
        run: |
          set -euo pipefail

          endpoint="https://us-central1-${FIREBASE_PROJECT_ID}.cloudfunctions.net/preparePublicOrderCheckout"
          headers_file="$(mktemp)"
          body_file="$(mktemp)"

          status="$(
            curl -sS -o /dev/null -D "$headers_file" \
              -X OPTIONS \
              -H "Origin: ${TEST_ORIGIN}" \
              -H "Access-Control-Request-Method: POST" \
              "$endpoint" \
              -w '%{http_code}'
          )"

          if [ "$status" = "403" ]; then
            echo "Preflight recebeu 403 em $endpoint"
            cat "$headers_file"
            exit 1
          fi

          if ! grep -Eiq '^access-control-allow-origin:' "$headers_file"; then
            echo "Header Access-Control-Allow-Origin ausente em $endpoint"
            cat "$headers_file"
            exit 1
          fi

          status="$(
            curl -sS -o "$body_file" \
              -X POST \
              -H "Origin: ${TEST_ORIGIN}" \
              -H "Content-Type: application/json" \
              --data '{}' \
              "$endpoint" \
              -w '%{http_code}'
          )"

          if grep -Eq 'PERMISSION_DENIED|Missing or insufficient permissions' "$body_file"; then
            echo "A Function ainda nao consegue acessar o Firestore em $endpoint"
            cat "$body_file"
            exit 1
          fi

          if [ "$status" = "403" ] || [ "$status" = "500" ]; then
            echo "Resposta inesperada ao testar acesso publico/Firestore em $endpoint"
            cat "$body_file"
            exit 1
          fi

name: Deploy Functions

on:
  push:
    branches: [main, staging]
    paths:
      - functions/**
      - .github/workflows/deploy-functions.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: npm install -g firebase-tools

      - run: npm --prefix functions ci

      - run: npm --prefix functions run build

      - name: Write Functions Env
        run: |
          cat <<EOF > functions/.env
          STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
          STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
          EOF
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ github.ref_name == 'main' && secrets.STRIPE_WEBHOOK_SECRET || secrets.STRIPE_WEBHOOK_SECRET_STAGING }}

      - run: firebase deploy --only functions --project "${{ vars.GCP_PROJECT_ID }}" --force

      - name: Verify Public Checkout Access
        env:
          FIREBASE_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          TEST_ORIGIN: ${{ vars.PUBLIC_WEB_ORIGIN }}
        run: |
          set -euo pipefail

          endpoint="https://us-central1-${FIREBASE_PROJECT_ID}.cloudfunctions.net/preparePublicOrderCheckout"
          headers_file="$(mktemp)"
          body_file="$(mktemp)"

          status="$(
            curl -sS -o /dev/null -D "$headers_file" \
              -X OPTIONS \
              -H "Origin: ${TEST_ORIGIN}" \
              -H "Access-Control-Request-Method: POST" \
              "$endpoint" \
              -w '%{http_code}'
          )"

          if [ "$status" = "403" ]; then
            echo "Preflight recebeu 403 em $endpoint"
            cat "$headers_file"
            exit 1
          fi

          if ! grep -Eiq '^access-control-allow-origin:' "$headers_file"; then
            echo "Header Access-Control-Allow-Origin ausente em $endpoint"
            cat "$headers_file"
            exit 1
          fi

          status="$(
            curl -sS -o "$body_file" \
              -X POST \
              -H "Origin: ${TEST_ORIGIN}" \
              -H "Content-Type: application/json" \
              --data '{}' \
              "$endpoint" \
              -w '%{http_code}'
          )"

          if grep -Eq 'PERMISSION_DENIED|Missing or insufficient permissions' "$body_file"; then
            echo "A Function ainda nao consegue acessar o Firestore em $endpoint"
            cat "$body_file"
            exit 1
          fi

          if [ "$status" = "403" ] || [ "$status" = "500" ]; then
            echo "Resposta inesperada ao testar acesso publico/Firestore em $endpoint"
            cat "$body_file"
            exit 1
          fi

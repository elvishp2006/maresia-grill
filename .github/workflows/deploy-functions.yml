name: Deploy Functions

on:
  push:
    branches: [main]
    paths:
      - functions/**
      - firebase.json
      - .github/workflows/deploy-functions.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: npm install -g firebase-tools

      - run: npm run gcp:check -- --project menu-7f7cd

      - run: npm --prefix functions ci

      - run: npm --prefix functions run build

      - name: Write Functions Env
        run: |
          cat <<EOF > functions/.env
          STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
          STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
          PUBLIC_MENU_BASE_URL=${PUBLIC_MENU_BASE_URL}
          EOF
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          PUBLIC_MENU_BASE_URL: ${{ secrets.PUBLIC_MENU_BASE_URL }}

      - run: firebase deploy --only functions --project menu-7f7cd --force

      - name: Verify Public Checkout CORS in Production
        env:
          TEST_ORIGIN: ${{ secrets.PUBLIC_MENU_BASE_URL }}
        run: |
          set -euo pipefail

          endpoint="https://us-central1-menu-7f7cd.cloudfunctions.net/preparePublicOrderCheckout"
          headers_file="$(mktemp)"

          status="$(
            curl -sS -o /dev/null -D "$headers_file" \
              -X OPTIONS \
              -H "Origin: ${TEST_ORIGIN}" \
              -H "Access-Control-Request-Method: POST" \
              "$endpoint" \
              -w '%{http_code}'
          )"

          if [ "$status" = "403" ]; then
            echo "Preflight recebeu 403 em $endpoint"
            cat "$headers_file"
            exit 1
          fi

          if ! grep -Eiq '^access-control-allow-origin:' "$headers_file"; then
            echo "Header Access-Control-Allow-Origin ausente em $endpoint"
            cat "$headers_file"
            exit 1
          fi

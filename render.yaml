projects:
  - name: maresia-grill-production
    environments:
      - name: production
        services:
          - type: web
            name: maresia-grill
            runtime: static
            buildCommand: npm install && npm run build
            staticPublishPath: dist
            routes:
              - type: rewrite
                source: /s/*
                destination: /index.html
              - type: rewrite
                source: /*
                destination: /index.html
      - name: staging
        services:
          - type: web
            name: maresia-grill-staging
            runtime: static
            buildCommand: npm install && npm run build
            staticPublishPath: dist
            previews:
              generation: automatic
            routes:
              - type: rewrite
                source: /s/*
                destination: /index.html
              - type: rewrite
                source: /*
                destination: /index.html
